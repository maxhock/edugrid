<footer class="site-footer">
    <div class="container">
        <div class="footer-content">
            <p>&copy; {{ 'now' | date: "%Y" }} {{ site.title }}. {{ site.description }}</p>
            {% if site.email %}
            <p>Contact: <a href="mailto:{{ site.email }}">{{ site.email }}</a></p>
            {% endif %}
            {% if site.github_username %}
            <p>GitHub: <a href="https://github.com/{{ site.github_username }}">{{ site.github_username }}</a></p>
            {% endif %}
        </div>
    </div>
</footer>
