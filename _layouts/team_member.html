---
layout: default
---
<article class="team-member">
    <header class="team-member-header">
        <h1>{{ page.name }}</h1>
        {% if page.role %}
        <p class="role">{{ page.role }}</p>
        {% endif %}
    </header>
    
    <div class="team-member-content">
        {% if page.image %}
        <img src="{{ page.image | relative_url }}" alt="{{ page.name }}" class="team-photo">
        {% endif %}
        
        {{ content }}
        
        {% if page.email %}
        <p><strong>Email:</strong> <a href="mailto:{{ page.email }}">{{ page.email }}</a></p>
        {% endif %}
    </div>
</article>
