title: EduGrid
subtitle: Renewable Energy Education
email: contact@edu-grid.org
description: Open-source, 3D-printable kits and textbooks from TU Munich that turn every classroom into a hands-on renewable energy lab.
baseurl: ""
url: "https://maxhock.github.io/edugrid-website"
author:
street_address:
city: Munich
state:
zip_code:
country: Germany
phone:

# homepage tiles (show pages that have nav-menu: true)
tiles-source: pages
tiles-count: 6

# social settings
socials:
  GitHub: https://github.com/maxhock

# build settings
markdown: kramdown
kramdown:
  parse_block_html: true

sass:
  style: compressed

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-timeago

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - tasks.json
  - "*.gemspec"
  - LICENSE.md
  - CONTRIBUTING.md
  - README.md
