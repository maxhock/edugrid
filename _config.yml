title: EduGrid
description: Renewable Energy Education Project
baseurl: ""
url: "https://maxhock.github.io/edugrid-website"

# Build settings
markdown: kramdown
kramdown:
  parse_block_html: true
theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Collections
collections:
  team:
    output: true
    permalink: /team/:name/
  publications:
    output: true
    permalink: /publications/:name/

# Defaults
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "team"
    values:
      layout: "team_member"

# Navigation
navigation:
  - title: About Us
    url: /about/
  - title: Hardware Kits
    url: /hardware-kits/
  - title: For Teachers
    url: /for-teachers/
  - title: For Students
    url: /for-students/
  - title: Blog
    url: /blog/
  - title: Get Involved
    url: /get-involved/support-us/

# Site settings
email: contact@edu-grid.org
github_username: maxhock

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - tasks.json
